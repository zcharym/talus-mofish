name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: talus-mofish
  NODE_OPTIONS: "--max-old-space-size=4096"
  WAILS3_VERSION: v3.0.0-alpha.60

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-amd64
            build-task: windows:build
            artifact: bin/talus-mofish.exe
            asset: talus-mofish-${{ github.ref_name }}-windows-amd64.exe
          - os: macos-latest
            name: macos-universal
            build-task: darwin:create:dmg
            artifact: bin/talus-mofish.dmg
            asset: talus-mofish-${{ github.ref_name }}-macos-universal.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS3_VERSION }}

      - name: Build
        run: wails3 task -f ${{ matrix.build-task }} PRODUCTION=true

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p release
          cp "${{ matrix.artifact }}" "release/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
