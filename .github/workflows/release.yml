name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: talus-mofish
  NODE_OPTIONS: "--max-old-space-size=4096"
  WAILS3_VERSION: v3.0.0-alpha.60

jobs:
  version-check:
    name: Check whether to build
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide build and release
        id: check
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "branch" ]; then
            echo "Push to ${GITHUB_REF_NAME}; building without publishing a release."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current="${GITHUB_REF_NAME#v}"
          if ! [[ "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Tag ${GITHUB_REF_NAME} is not semver (x.y.z); skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -Fxv "${GITHUB_REF_NAME}" | head -1 || true)"
          if [ -z "$previous_tag" ]; then
            echo "No previous semver tag found; building release."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous="${previous_tag#v}"
          current_mm="$(echo "$current" | cut -d. -f1-2)"
          previous_mm="$(echo "$previous" | cut -d. -f1-2)"

          if [ "$current_mm" != "$previous_mm" ]; then
            echo "Major/minor changed (${previous_mm} -> ${current_mm}); building release."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Patch-only change (${previous} -> ${current}); skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.name }})
    needs: version-check
    if: needs.version-check.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-amd64
            build-task: windows:build
            artifact: bin/talus-mofish.exe
            asset: talus-mofish-${{ github.ref_name }}-windows-amd64.exe
          - os: macos-latest
            name: macos-universal
            build-task: darwin:create:dmg
            artifact: bin/talus-mofish.dmg
            asset: talus-mofish-${{ github.ref_name }}-macos-universal.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS3_VERSION }}

      - name: Build
        run: wails3 task -f ${{ matrix.build-task }} PRODUCTION=true

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p release
          cp "${{ matrix.artifact }}" "release/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [version-check, build]
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
