name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  APP_NAME: talus-mofish
  NODE_OPTIONS: "--max-old-space-size=4096"
  WAILS3_VERSION: v3.0.0-alpha.60

jobs:
  semantic-release:
    name: Tag release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.name }})
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-amd64
            build-task: windows:build
            artifact: bin/talus-mofish.exe
            asset_suffix: windows-amd64.exe
          - os: macos-latest
            name: macos-arm64
            build-task: darwin:create:dmg
            artifact: bin/talus-mofish.dmg
            asset_suffix: macos-arm64.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.new_release_git_tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS3_VERSION }}

      - name: Build
        run: wails3 task -f ${{ matrix.build-task }} PRODUCTION=true

      - name: Stage release asset
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.semantic-release.outputs.new_release_git_tag }}
        run: |
          mkdir -p release
          cp "${{ matrix.artifact }}" "release/talus-mofish-${RELEASE_TAG}-${{ matrix.asset_suffix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Upload release assets
    needs: [semantic-release, build]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Upload assets to GitHub Release
        run: gh release upload "${{ needs.semantic-release.outputs.new_release_git_tag }}" release/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
